name: CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FRONTEND_API_URL: /api
  AZURE_RESOURCE_GROUP: gradproject-rg
  AZURE_LOCATION: francecentral
  AZURE_CONTAINER_NAME: gradproject-back
  AZURE_DNS_LABEL: gradproject-back-1776705847

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Detect changed paths
      id: filter
      uses: dorny/paths-filter@v3
      with:
        filters: |
          backend:
            - 'backend/**'
          frontend:
            - 'frontend/**'
          workflows:
            - '.github/workflows/**'

  build-and-push-backend:
    name: Build and Push Backend Docker Image
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set image names
      run: |
        echo "IMAGE_NAME_BACKEND=${GITHUB_REPOSITORY,,}/backend" >> "$GITHUB_ENV"
        echo "IMAGE_NAME_FRONTEND=${GITHUB_REPOSITORY,,}/frontend" >> "$GITHUB_ENV"
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata for Backend
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build and push Backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:buildcache
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:buildcache,mode=max

  build-and-push-frontend:
    name: Build and Push Frontend Docker Image
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set image names
      run: |
        echo "IMAGE_NAME_BACKEND=${GITHUB_REPOSITORY,,}/backend" >> "$GITHUB_ENV"
        echo "IMAGE_NAME_FRONTEND=${GITHUB_REPOSITORY,,}/frontend" >> "$GITHUB_ENV"
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata for Frontend
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build and push Frontend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        platforms: linux/amd64
        build-args: |
          VITE_API_URL=${{ vars.VITE_API_URL != '' && vars.VITE_API_URL || env.FRONTEND_API_URL }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:buildcache
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:buildcache,mode=max

  deploy-backend-azure:
    name: Redeploy Backend To Azure
    needs: [changes, build-and-push-backend]
    if: needs.build-and-push-backend.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
    - name: Azure login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Remove existing backend container if present
      run: |
        if az container show --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --name "${{ env.AZURE_CONTAINER_NAME }}" >/dev/null 2>&1; then
          az container delete \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_CONTAINER_NAME }}" \
            --yes
        fi

    - name: Deploy latest backend image
      run: |
        az container create \
          --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
          --name "${{ env.AZURE_CONTAINER_NAME }}" \
          --location "${{ env.AZURE_LOCATION }}" \
          --os-type Linux \
          --cpu 1 \
          --memory 1.5 \
          --image "${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}/backend:latest" \
          --dns-name-label "${{ env.AZURE_DNS_LABEL }}" \
          --ip-address Public \
          --ports 5000 \
          --environment-variables \
            PORT=5000 \
            NODE_ENV=production \
          --secure-environment-variables \
            MONGO_URI="${{ secrets.MONGO_URI }}" \
            JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}" \
            CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}" \
            CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}"

    - name: Verify backend deployment
      run: |
        az container show \
          --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
          --name "${{ env.AZURE_CONTAINER_NAME }}" \
          --query "{state:instanceView.state,fqdn:ipAddress.fqdn,ip:ipAddress.ip}" \
          -o json

        curl --retry 10 --retry-delay 5 --retry-connrefused \
          "http://${{ env.AZURE_DNS_LABEL }}.${{ env.AZURE_LOCATION }}.azurecontainer.io:5000/health"

  deploy-notification:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [changes, build-and-push-backend, build-and-push-frontend, deploy-backend-azure]
    if: always() && (needs.build-and-push-backend.result == 'success' || needs.build-and-push-frontend.result == 'success' || needs.deploy-backend-azure.result == 'success')
    permissions:
      contents: read
    
    steps:
    - name: Send deployment notification
      run: |
        echo "🚀 Deployment successful!"
        echo "Backend job: ${{ needs.build-and-push-backend.result }}"
        echo "Backend Azure deploy: ${{ needs.deploy-backend-azure.result }}"
        echo "Frontend job: ${{ needs.build-and-push-frontend.result }}"
        echo "Backend image: ${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}/backend:latest"
        echo "Frontend image: ${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}/frontend:latest"
# draft for testing
