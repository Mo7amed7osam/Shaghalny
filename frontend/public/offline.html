<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Offline | Shaghalny Student</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e2e8f0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(37, 99, 235, 0.25), transparent 28%),
        linear-gradient(180deg, #0f172a 0%, #020617 100%);
      padding: 24px;
    }

    main {
      width: min(100%, 420px);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.9);
      box-shadow: 0 20px 60px rgba(2, 6, 23, 0.45);
      padding: 28px;
    }

    .eyebrow {
      margin: 0 0 12px;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #93c5fd;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.1;
    }

    p {
      margin: 14px 0 0;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    a, button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }

    a {
      background: #2563eb;
      color: white;
    }

    button {
      background: rgba(148, 163, 184, 0.12);
      color: #e2e8f0;
      border: 1px solid rgba(148, 163, 184, 0.18);
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Shaghalny Student</p>
    <h1>You're offline.</h1>
    <p>Your last loaded workspace pages can still open from cache. Reconnect to sync jobs, payouts, and interview updates.</p>
    <div class="actions">
      <a href="/student/dashboard">Open dashboard</a>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </div>
  </main>
</body>
</html>
